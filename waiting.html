<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الانتظار | السرحان نت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { border: 1.5px solid #1e3a8a; border-radius: 2rem; background: #020617; width: 340px; padding: 40px 30px; text-align: center; }
        .status-dot { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; display: inline-block; }
        .active-dot { background: #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); } 50% { transform: scale(1.2); } }
        .btn-ready { background: linear-gradient(135deg, #0891b2, #22d3ee); }
        .btn-disabled { opacity: 0.3; cursor: not-allowed; background: #1e293b; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="text-2xl font-black italic">السرحان <span class="text-cyan-400">NET</span></h1>
        <p id="statusText" class="text-slate-400 text-sm my-4">⏳ بانتظار تفعيل الأدمن...</p>
        <div class="flex items-center justify-center gap-3 my-4">
            <span id="statusDot" class="status-dot"></span>
            <span id="userCode" class="text-xl font-mono">------</span>
        </div>
        <button id="loginBtn" onclick="activateAndConnect()" disabled class="w-full py-4 rounded-2xl font-black btn-disabled">⏳ بانتظار التفعيل...</button>
        <p class="text-[9px] text-slate-600 mt-6">Sarhan Network 2026</p>
    </div>

    <form id="fortiForm" method="POST" style="display:none;">
        <input type="hidden" name="magic" id="fgt_magic">
        <input type="hidden" name="username" id="fgt_user">
        <input type="hidden" name="password" id="fgt_pass">
        <input type="hidden" name="ajax" value="1">
    </form>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentPhone = urlParams.get('phone');
        let activationCompleted = false;

        if (currentPhone) {
            localStorage.setItem('temp_phone', currentPhone);
            
            database.ref('active_users/' + currentPhone).on('value', (snap) => {
                const data = snap.val();
                if (data && data.status === 'active') {
                    document.getElementById('userCode').innerText = data.code || "SUCCESS";
                    document.getElementById('statusDot').classList.add('active-dot');
                    document.getElementById('statusText').innerHTML = "✅ تم التفعيل! اضغط للدخول";
                    
                    const btn = document.getElementById('loginBtn');
                    btn.disabled = false;
                    btn.classList.remove('btn-disabled');
                    btn.classList.add('btn-ready');
                    btn.innerText = "🌐 دخول الشبكة الآن";
                }
            });
        }

        function activateAndConnect() {
            if (activationCompleted) return;
            
            const userCode = document.getElementById('userCode').innerText;
            if (userCode === "------") return;
            
            const { magic, postUrl } = getFortiGateData();
            if (!magic) {
                alert("انتهت الجلسة. يرجى العودة للصفحة الرئيسية");
                return;
            }
            
            activationCompleted = true;
            
            document.getElementById('fgt_user').value = userCode;
            document.getElementById('fgt_pass').value = userCode;
            document.getElementById('fgt_magic').value = magic;
            document.getElementById('fortiForm').action = postUrl || DEFAULT_FORTIGATE_URL;
            document.getElementById('fortiForm').submit();
        }
    </script>
</body>
</html>
