<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>السرحان NET | الإدارة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #010816; color: white; padding: 15px; }
        .card-user { background: #020d20; border: 1px solid #1e3a8a; border-radius: 2rem; padding: 20px; margin-bottom: 15px; cursor: pointer; }
        .tab-active { background: #1e3a8a; border: 2px solid #22d3ee; color: #22d3ee; }
        .tab-inactive { background: #020d20; border: 1px solid #1e3a8a; color: #64748b; }
        .input-box { background: #0f172a; border: 1.5px solid #1e3a8a; border-radius: 1.2rem; padding: 12px; width: 100%; color: white; text-align: center; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .modal-content { background: #020d20; border: 2px solid #1e3a8a; border-radius: 2rem; width: 100%; max-width: 500px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .badge-count { background: #ef4444; color: white; font-size: 10px; padding: 2px 7px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div class="flex justify-between items-center mb-6">
    <div class="flex gap-3">
        <button onclick="logoutAdmin()" class="w-12 h-12 bg-red-500/20 rounded-2xl"><i class="fas fa-power-off"></i></button>
    </div>
    <h1 class="text-2xl font-black italic">السرحان <span class="text-cyan-500">NET</span></h1>
    <button onclick="openDrawer()" class="w-12 h-12 bg-cyan-500/20 rounded-2xl"><i class="fas fa-bars"></i></button>
</div>

<div class="grid grid-cols-2 gap-4 mb-6 text-center">
    <div class="bg-blue-900/20 p-4 rounded-3xl"><p class="text-xs">العملاء</p><h2 id="totalUsers" class="text-2xl font-black">0</h2></div>
    <div class="bg-yellow-900/20 p-4 rounded-3xl"><p class="text-xs">الطلبات</p><h2 id="totalOrders" class="text-2xl font-black">0</h2></div>
</div>

<div class="flex gap-4 mb-6">
    <button onclick="showTab('orders')" id="btnOrders" class="flex-1 py-3 rounded-2xl font-black tab-active">الطلبات <span id="orderBadge" class="badge-count hidden">0</span></button>
    <button onclick="showTab('users')" id="btnUsers" class="flex-1 py-3 rounded-2xl font-black tab-inactive">العملاء</button>
</div>

<div id="ordersSection"><div id="ordersList"></div></div>
<div id="usersSection" class="hidden"><div id="usersList"></div></div>

<!-- مودال الطلب -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <button onclick="closeOrderModal()" class="float-left text-2xl">&times;</button>
        <h3 class="text-xl font-bold mb-4">تفاصيل الطلب</h3>
        <p id="modalOrderName" class="text-center text-lg font-bold">--</p>
        <p id="modalOrderPrice" class="text-center text-green-500 text-xl">--</p>
        <input type="text" id="editMacAddress" class="input-box my-3" placeholder="MAC Address">
        <div class="flex gap-3">
            <input type="number" id="editSpeedDown" placeholder速度 تحميل" class="input-box">
            <input type="number" id="editSpeedUp" placeholder="سرعة رفع" class="input-box">
        </div>
        <button onclick="approveOrder()" class="w-full bg-green-600 py-3 rounded-2xl font-bold mt-4">✅ تفعيل</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="config.js"></script>

<script>
    let currentPhone = "", currentOrder = null, firstLoad = true;

    function calculateEndDate() {
        const d = new Date(); d.setDate(d.getDate() + 30);
        return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
    }

    function approveOrder() {
        if (!currentOrder) return;
        const phone = currentPhone;
        const mac = document.getElementById('editMacAddress').value.trim().toUpperCase();
        const speedDown = parseFloat(document.getElementById('editSpeedDown').value) || 10;
        const speedUp = parseFloat(document.getElementById('editSpeedUp').value) || 5;
        const endDate = calculateEndDate();
        const code = Math.floor(100000 + Math.random() * 900000);
        const totalGB = parseFloat(currentOrder.planGB) || 0;

        database.ref('active_users/' + phone).set({
            mac, name: currentOrder.name, phone, remainingGB: totalGB, totalGB, usedGB: 0,
            speed_down: speedDown, speed_up: speedUp, speed_limit: speedDown,
            status: "active", code, ip: currentOrder.ip || "", endDate,
            magic: currentOrder.magic, msg: `✅ تم التفعيل\n🔑 كود: ${code}\n📅 ينتهي: ${endDate}`
        }).then(() => {
            database.ref('orders/' + phone).remove();
            database.ref('stats/totalProfits').transaction(c => (c||0) + (currentOrder.price || 0));
            alert(`✅ تم التفعيل!\n🔑 كود: ${code}`);
            closeOrderModal();
        });
    }

    function openOrderModal(phone) {
        currentPhone = phone;
        database.ref('orders/' + phone).once('value', s => {
            currentOrder = s.val();
            if (currentOrder) {
                document.getElementById('modalOrderName').innerText = currentOrder.name;
                document.getElementById('modalOrderPrice').innerText = (currentOrder.price || 0) + " ج.م";
                document.getElementById('editMacAddress').value = currentOrder.mac || "";
                document.getElementById('editSpeedDown').value = currentOrder.speed_limit || 10;
                document.getElementById('editSpeedUp').value = currentOrder.speed_up || 5;
                document.getElementById('orderModal').style.display = 'flex';
            }
        });
    }

    function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; currentOrder = null; }

    database.ref('active_users').on('value', s => {
        let html = '', count = 0;
        s.forEach(c => { count++; const u = c.val(); html += `<div class="card-user" onclick="alert('تعديل: ${u.name}')"><p class="font-bold">${u.name}</p><p class="text-xs">${u.remainingGB || 0} GB متبقي</p></div>`; });
        document.getElementById('usersList').innerHTML = html;
        document.getElementById('totalUsers').innerText = count;
    });

    database.ref('orders').on('value', s => {
        let html = '', count = 0;
        s.forEach(c => { const o = c.val(); if(o.status !== 'approved') { count++; html += `<div class="card-user border-yellow-500/30 bg-yellow-500/5"><div class="flex justify-between"><button onclick="openOrderModal('${c.key}')" class="bg-white text-black px-4 py-2 rounded-xl">تفعيل</button><p class="font-bold">${o.name}</p></div><p class="text-xs">${o.planGB} GB - ${o.price} ج.م</p></div>`; } });
        document.getElementById('ordersList').innerHTML = html;
        document.getElementById('totalOrders').innerText = count;
        const badge = document.getElementById('orderBadge');
        if(badge) { badge.innerText = count; badge.classList.toggle('hidden', count === 0); }
        if(!firstLoad && count > 0) new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
        firstLoad = false;
    });

    function showTab(t) {
        document.getElementById('usersSection').classList.toggle('hidden', t !== 'users');
        document.getElementById('ordersSection').classList.toggle('hidden', t !== 'orders');
        document.getElementById('btnUsers').className = t === 'users' ? 'flex-1 py-3 rounded-2xl font-black tab-active' : 'flex-1 py-3 rounded-2xl font-black tab-inactive';
        document.getElementById('btnOrders').className = t === 'orders' ? 'flex-1 py-3 rounded-2xl font-black tab-active' : 'flex-1 py-3 rounded-2xl font-black tab-inactive';
    }

    function logoutAdmin() { if(confirm("خروج؟")) window.location.reload(); }
    function openDrawer() { alert("لوحة التحكم - قيد التطوير"); }
</script>
</body>
</html>
