<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السرحان للدفع الإلكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .main-border { border: 1.5px solid #1e3a8a; border-radius: 2rem; background: #020617; width: 340px; padding: 25px; }
        .input-field { background: #030a1a; border: 1px solid #1e3a8a; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; text-align: center; }
        .confirm-btn { background: white; color: black; width: 100%; padding: 14px; border-radius: 1rem; font-weight: 900; cursor: pointer; }
        .confirm-btn:hover { background: #22d3ee; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #0f172a; border: 2px solid #1e3a8a; border-radius: 2rem; width: 300px; padding: 30px; text-align: center; }
    </style>
</head>
<body>
    <div class="main-border">
        <h2 class="text-center text-lg font-black">السرحان <span class="text-blue-500">STORE</span></h2>
        <div id="priceDisplay" class="text-center text-cyan-400 text-sm my-3"></div>
        
        <div class="bg-white rounded-2xl p-4 my-4 text-center">
            <p class="text-black text-xs">كود الدفع</p>
            <p id="ussdCode" class="text-black text-xl font-mono font-bold"></p>
        </div>
        
        <input type="text" id="custName" class="input-field mb-3" placeholder="اسم العميل">
        <input type="tel" id="custPhone" class="input-field mb-3" placeholder="رقم الموبايل">
        
        <button onclick="openModal()" class="confirm-btn">التالي 🚀</button>
    </div>

    <div id="modalOverlay" class="modal">
        <div class="modal-content">
            <h3 class="text-cyan-400 font-black">رفع الإيصال</h3>
            <input type="file" id="fileIn" accept="image/*" class="my-4 text-white text-sm">
            <button onclick="submitOrder()" class="confirm-btn bg-cyan-500 text-white">إرسال الطلب</button>
            <button onclick="closeModal()" class="text-red-500 text-xs mt-4">إلغاء</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const planGB = urlParams.get('gb') || "100";
        const planPrice = urlParams.get('price') || "100";
        const planName = urlParams.get('name') || `${planGB} جيجا`;
        const clientMac = urlParams.get('clientmac') || urlParams.get('mac') || "00:00:00:00:00:00";
        const magicFromUrl = urlParams.get('magic');
        
        if (magicFromUrl) {
            sessionStorage.setItem('fgt_magic', magicFromUrl);
            localStorage.setItem('saved_fgt_magic', magicFromUrl);
        }
        
        const wallet = "01068222773";
        const ussdCode = `*9*7*${wallet}*${planPrice}#`;
        
        document.getElementById('priceDisplay').innerHTML = `📦 ${planName} | 💰 ${planPrice} ج.م`;
        document.getElementById('ussdCode').innerText = ussdCode;
        
        function openModal() {
            if (document.getElementById('custName').value.length < 3) return alert("ادخل اسمك");
            if (document.getElementById('custPhone').value.length < 10) return alert("رقم الهاتف غير صحيح");
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        
        async function submitOrder() {
            const file = document.getElementById('fileIn').files[0];
            if (!file) return alert("ارفع صورة التحويل");
            
            const name = document.getElementById('custName').value;
            const rawPhone = document.getElementById('custPhone').value;
            const formattedPhone = formatPhoneNumber(rawPhone);
            const currentMagic = getFortiGateData().magic;
            
            await database.ref('orders/' + formattedPhone).set({
                name, phone: formattedPhone, price: parseFloat(planPrice),
                planGB, planName, status: "pending",
                mac: clientMac, date: new Date().toLocaleString(),
                speed_limit: 10, speed_up: 5, magic: currentMagic
            });
            
            await sendTelegramPhoto(file, `🚀 طلب جديد\n👤 ${name}\n📞 ${formattedPhone}\n💰 ${planPrice}\n📦 ${planGB} GB`);
            window.location.href = `waiting.html?phone=${encodeURIComponent(formattedPhone)}`;
        }
    </script>
</body>
</html>
