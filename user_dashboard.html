<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السرحان NET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; padding: 15px; }
        .card { background: #0f172a; border-radius: 1.5rem; padding: 20px; border: 1px solid #1e3a8a; margin-bottom: 15px; }
        .progress-bar { height: 8px; background: #1e293b; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0891b2, #22d3ee); transition: width 0.5s; }
        .gift-fill { background: linear-gradient(90deg, #b45309, #fbbf24) !important; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic"><span id="fullName">...</span></h1>
            <button onclick="logout()" class="bg-red-500/20 px-4 py-2 rounded-xl text-sm"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>

        <div id="giftCard" class="card hidden" style="background: linear-gradient(135deg, #1e1b0f, #0f0e0a); border-color: #fbbf24;">
            <p class="text-yellow-500 text-sm font-bold">🎁 باقة الهدية</p>
            <h2 id="giftRem" class="text-3xl font-black text-yellow-400">0</h2>
            <div class="progress-bar mt-2"><div id="giftFill" class="progress-fill gift-fill" style="width:0%"></div></div>
        </div>

        <div class="card">
            <p class="text-slate-400 text-sm">الرصيد المتبقي</p>
            <h2 id="remGiga" class="text-5xl font-black">0</h2>
            <div class="progress-bar mt-2"><div id="progressInner" class="progress-fill" style="width:0%"></div></div>
            <div class="flex justify-between mt-3 text-xs">
                <span>إجمالي: <span id="totalGB">0</span> GB</span>
                <span>مستهلك: <span id="usedGB">0</span> GB</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="card text-center"><p class="text-slate-400 text-xs">تاريخ الانتهاء</p><p id="expiryDate" class="font-bold text-cyan-400">--/--/----</p></div>
            <div class="card text-center"><p class="text-slate-400 text-xs">كود العميل</p><p id="userCode" class="font-mono font-bold">------</p></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-3">
            <button onclick="renewPlan()" class="bg-cyan-600 py-3 rounded-xl font-bold">تجديد</button>
            <button onclick="window.location.href='index.html'" class="bg-purple-600 py-3 rounded-xl font-bold">تغيير باقة</button>
        </div>

        <div id="adminMsgBox" class="card hidden bg-blue-600/10 border-blue-500">
            <p class="text-blue-400 text-xs">📢 رسالة من الإدارة</p>
            <p id="adminMsgText" class="text-sm"></p>
        </div>
    </div>

    <form id="logoutForm" method="POST" style="display:none;">
        <input type="hidden" name="magic" id="logoutMagic">
        <input type="hidden" name="logout" value="1">
    </form>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        let phone = "";
        const rawPhone = localStorage.getItem('temp_phone');
        
        if (rawPhone) {
            phone = formatPhoneNumber(rawPhone);
        } else {
            window.location.href = 'index.html';
        }

        database.ref('active_users/' + phone).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                document.getElementById('fullName').innerText = data.name || 'عميل';
                document.getElementById('userCode').innerText = data.code || 'N/A';
                
                const remaining = data.remainingGB || 0;
                const total = data.totalGB || 0;
                const used = data.usedGB || 0;
                
                document.getElementById('remGiga').innerText = remaining.toFixed(2);
                document.getElementById('totalGB').innerText = total;
                document.getElementById('usedGB').innerText = used;
                
                const percent = total > 0 ? (remaining / total) * 100 : 0;
                document.getElementById('progressInner').style.width = percent + "%";
                document.getElementById('expiryDate').innerText = data.endDate || 'غير محدد';
                
                const gTotal = data.giftTotal || 0;
                const gUsed = data.giftUsed || 0;
                const gRem = gTotal - gUsed;
                
                if (gTotal > 0 && gRem > 0) {
                    document.getElementById('giftCard').classList.remove('hidden');
                    document.getElementById('giftRem').innerText = gRem.toFixed(1);
                    const gPercent = (gRem / gTotal) * 100;
                    document.getElementById('giftFill').style.width = gPercent + "%";
                }
                
                if (data.msg) {
                    document.getElementById('adminMsgBox').classList.remove('hidden');
                    document.getElementById('adminMsgText').innerText = data.msg;
                }
            }
        });

        function renewPlan() {
            database.ref('active_users/' + phone).once('value', s => {
                const u = s.val();
                if (u && u.magic) saveFortiGateData(u.magic);
                window.location.href = `pay.html?price=${u.totalGB}&gb=${u.totalGB}&name=${encodeURIComponent(u.name)}`;
            });
        }

        function logout() {
            const { magic } = getFortiGateData();
            if (magic) {
                document.getElementById('logoutMagic').value = magic;
                document.getElementById('logoutForm').action = DEFAULT_LOGOUT_URL;
                document.getElementById('logoutForm').submit();
            }
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
