<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - السرحان نت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: radial-gradient(circle at 20% 30%, #010816, #000); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .login-card { border: 1.5px solid #1e3a8a; border-radius: 2.5rem; background: #020617cc; backdrop-filter: blur(8px); width: 100%; max-width: 360px; padding: 40px 30px; text-align: center; }
        .input-field { background: #030a1a; border: 1px solid #1e3a8a; border-radius: 1rem; padding: 12px; width: 100%; color: white; outline: none; text-align: right; }
        .input-field:focus { border-color: #22d3ee; }
        .login-btn { background: linear-gradient(135deg, #fff, #e2e8f0); color: #010816; width: 100%; padding: 14px; border-radius: 1rem; font-weight: 900; cursor: pointer; }
        .login-btn:hover { background: #22d3ee; }
    </style>
</head>
<body>
    <form id="fgt_auth_form" method="POST" style="display:none;">
        <input type="hidden" name="username" id="fgt_user">
        <input type="hidden" name="password" value="123456">
        <input type="hidden" name="magic" id="fgt_magic_input">
        <input type="hidden" name="ajax" value="1">
    </form>

    <div class="login-card">
        <h1 class="text-3xl font-black italic mb-2">السرحان <span class="text-cyan-500">NET</span></h1>
        <p class="text-[10px] text-cyan-500 mb-6">بوابة العملاء</p>
        
        <input type="text" id="username" class="input-field mb-3" placeholder="رقم الجوال">
        <input type="password" id="password" class="input-field mb-3" placeholder="كود التفعيل">
        
        <button onclick="handleLogin()" class="login-btn mt-4">دخول <i class="fas fa-sign-in-alt mr-2"></i></button>
        
        <a href="index.html" class="text-[11px] text-slate-500 block mt-4">ليس لديك حساب؟ اشترك الآن</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                alert("⚠️ برجاء إدخال رقم الجوال وكود التفعيل");
                return;
            }

            const formattedPhone = formatPhoneNumber(username);
            const { magic, postUrl } = getFortiGateData();
            
            if (!magic) {
                alert("⚠️ انتهت الجلسة. يرجى العودة للصفحة الرئيسية");
                return;
            }

            // التحقق من صحة المستخدم في Firebase
            const userSnap = await database.ref('active_users/' + formattedPhone).once('value');
            const user = userSnap.val();
            
            if (!user || user.code !== password) {
                alert("❌ رقم الجوال أو كود التفعيل غير صحيح");
                return;
            }

            if (user.status === 'blocked') {
                alert("🚫 حسابك محظور. راجع الإدارة");
                return;
            }

            // إرسال إلى فورتي جيت
            document.getElementById('fgt_user').value = user.code;
            document.getElementById('fgt_magic_input').value = magic;
            document.getElementById('fgt_auth_form').action = postUrl || DEFAULT_FORTIGATE_URL;
            
            localStorage.setItem('temp_phone', formattedPhone);
            document.getElementById('fgt_auth_form').submit();
        }

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const magic = urlParams.get('magic');
            const post = urlParams.get('post');
            if (magic) {
                sessionStorage.setItem('fgt_magic', magic);
                localStorage.setItem('saved_fgt_magic', magic);
                if (post) sessionStorage.setItem('fgt_post', post);
            }
        })();
    </script>
</body>
</html>
