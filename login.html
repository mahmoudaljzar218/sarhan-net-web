<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل دخول - السرحان نت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 20% 30%, #010816, #000000);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            border: 1.5px solid #1e3a8a;
            border-radius: 2.5rem;
            background: #020617cc;
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            box-shadow: 0 0 40px rgba(30, 58, 138, 0.4);
            text-align: center;
            transition: 0.3s;
        }
        .login-card:hover {
            border-color: #22d3ee;
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.2);
        }
        .input-group { position: relative; margin-top: 20px; }
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #1e3a8a;
            font-size: 14px;
            z-index: 1;
        }
        .input-field {
            background: #030a1a;
            border: 1px solid #1e3a8a;
            border-radius: 1rem;
            padding: 12px 40px 12px 15px;
            width: 100%;
            font-size: 13px;
            color: white;
            outline: none;
            transition: 0.3s;
            text-align: right;
        }
        .input-field:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
        }
        .input-field::placeholder {
            color: #475569;
            font-size: 12px;
        }
        .remember-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding-right: 5px;
            cursor: pointer;
            justify-content: flex-start;
        }
        .remember-container input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #22d3ee;
        }
        .remember-text {
            font-size: 12px;
            color: #94a3b8;
            user-select: none;
        }
        .login-btn {
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            color: #010816;
            width: 100%;
            padding: 14px;
            border-radius: 1rem;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            border: none;
        }
        .login-btn:hover {
            background: #22d3ee;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(34, 211, 238, 0.3);
        }
        .support-link {
            margin-top: 20px;
            font-size: 11px;
            color: #475569;
            display: block;
            text-decoration: none;
        }
        .support-link span {
            color: #22d3ee;
            font-weight: bold;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 1rem;
            padding: 10px;
            font-size: 11px;
            color: #ef4444;
            margin-top: 15px;
            display: none;
            text-align: center;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .session-warning {
            background: rgba(34, 211, 238, 0.15);
            border: 1px solid #22d3ee;
            border-radius: 0.75rem;
            padding: 8px;
            font-size: 10px;
            color: #22d3ee;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- 🔥 نموذج POST الخفي لفورتي جيت 🔥 -->
    <form id="fgt_auth_form" method="POST" action="" style="display: none;">
        <input type="hidden" name="username" id="fgt_user">
        <input type="hidden" name="password" value="123456">
        <input type="hidden" name="magic" id="fgt_magic_input">
    </form>

    <div class="login-card">
        <div class="mb-5">
            <h1 class="text-3xl font-black italic tracking-tight">السرحان <span class="text-cyan-500">NET</span></h1>
            <p class="text-[10px] text-cyan-500 font-bold tracking-[3px] uppercase mt-1">بوابة العملاء</p>
        </div>

        <!-- تنبيه الجلسة -->
        <div id="sessionWarning" class="session-warning">
            <i class="fas fa-info-circle ml-1"></i> يرجى الدخول من صفحة الباقات الرئيسية أولاً
        </div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم أو رقم الجوال" autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" id="password" class="input-field" placeholder="كود التفعيل" autocomplete="off">
        </div>

        <label class="remember-container">
            <input type="checkbox" id="rememberMe">
            <span class="remember-text">تذكرني على هذا الجهاز</span>
        </label>

        <button onclick="handleLogin()" class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt ml-2"></i> دخول
        </button>

        <div id="errorMsg" class="error-msg"></div>

        <a href="#" onclick="requestNewAccount()" class="support-link">ليس لديك حساب؟ <span>اشترك الآن</span></a>
        
        <p class="text-[9px] text-slate-700 mt-5 italic">Secure Gateway v3.0 | Sarhan NET</p>
    </div>

    <script>
        let isLoading = false;
        
        // 🔥 عنوان فورتي جيت الافتراضي (يمكن تغييره حسب الحاجة)
        const DEFAULT_FORTIGATE_URL = 'http://192.168.1.99:1000/fgtauth';
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { 
                errorDiv.style.display = 'none'; 
            }, 4000);
        }

        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.innerHTML = '<span class="loading-spinner"></span> جاري التفعيل...';
                btn.disabled = true;
            } else {
                btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i> دخول';
                btn.disabled = false;
            }
        }

        // 🔥 الدالة الأساسية للتسجيل وإرسال POST إلى فورتي جيت
        async function handleLogin() {
            if (isLoading) return;
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const isRemembered = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                showError("⚠️ برجاء إدخال اسم المستخدم وكود التفعيل");
                return;
            }

            // 🔥 الحصول على magic من Session Storage (المحفوظ من index.html)
            const savedMagic = sessionStorage.getItem('fgt_magic');
            const savedPost = sessionStorage.getItem('fgt_post') || DEFAULT_FORTIGATE_URL;

            // 🔥 التحقق من وجود الجلسة
            if (!savedMagic) {
                showError("⚠️ انتهت الجلسة. يرجى العودة للصفحة الرئيسية وإعادة المحاولة");
                document.getElementById('sessionWarning').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('sessionWarning').style.display = 'none';
                }, 5000);
                return;
            }

            setLoading(true);

            try {
                // حفظ بيانات التذكر (ميزة إضافية)
                if (isRemembered) {
                    localStorage.setItem('saved_user', username);
                    localStorage.setItem('saved_pass', password);
                } else {
                    localStorage.removeItem('saved_user');
                    localStorage.removeItem('saved_pass');
                }

                // 🔥 تسجيل البيانات في الكونسول للمراقبة
                console.log('🚀 إرسال البيانات إلى فورتي جيت:', {
                    url: savedPost,
                    username: username,
                    magic: savedMagic,
                    password_fixed: '123456'
                });

                // 🔥 تعبئة نموذج فورتي جيت وإرساله
                document.getElementById('fgt_user').value = username;
                document.getElementById('fgt_magic_input').value = savedMagic;
                document.getElementById('fgt_auth_form').action = savedPost;
                
                // حفظ جلسة المستخدم في localStorage للتتبع
                localStorage.setItem('user_login_data', JSON.stringify({
                    type: 'user',
                    id: username,
                    magic: savedMagic,
                    timestamp: Date.now()
                }));
                
                // 🔥 إرسال النموذج إلى فورتي جيت
                document.getElementById('fgt_auth_form').submit();
                
                // ملاحظة: بعد الـ submit، الصفحة قد تتوجه إلى وجهة يحددها فورتي جيت
                // إذا نجح التفعيل، سيتم توجيه العميل تلقائياً
                
            } catch (error) {
                setLoading(false);
                console.error("❌ خطأ في الاتصال:", error);
                showError("⚠️ فشل الاتصال بالبوابة، تأكد من اتصالك بالشبكة");
            }
        }

        // تحميل البيانات المخزنة من localStorage
        function loadSavedCredentials() {
            const savedUser = localStorage.getItem('saved_user');
            const savedPass = localStorage.getItem('saved_pass');
            
            if (savedUser) {
                document.getElementById('username').value = savedUser;
            }
            if (savedPass) {
                document.getElementById('password').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
        }

        function requestNewAccount() {
            window.location.href = "index.html";
        }

        // 🔥 قراءة magic و post من رابط الصفحة الحالية وحفظهما في sessionStorage
        function loadMagicFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const magic = urlParams.get('magic');
            const post = urlParams.get('post');
            
            if (magic) {
                sessionStorage.setItem('fgt_magic', magic);
                if (post) sessionStorage.setItem('fgt_post', post);
                console.log('✅ تم حفظ magic من الرابط:', magic);
            } else {
                // التحقق إذا كان magic موجوداً مسبقاً
                const existingMagic = sessionStorage.getItem('fgt_magic');
                if (existingMagic) {
                    console.log('♻️ استعادة magic من الجلسة السابقة:', existingMagic);
                } else {
                    console.warn('⚠️ لا يوجد magic في الرابط أو الجلسة');
                }
            }
        }

        // إدخال Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        
        // تحميل البيانات عند بدء الصفحة
        window.onload = function() {
            loadMagicFromUrl();      // 🔥 الأهم: تحميل magic من الرابط أو الجلسة
            loadSavedCredentials();  // تحميل بيانات التذكر
            
            // التحقق من وجود magic وإظهار تنبيه إذا لم يكن موجوداً
            const magic = sessionStorage.getItem('fgt_magic');
            if (!magic) {
                document.getElementById('sessionWarning').style.display = 'block';
            }
        };
    </script>
</body>
</html>
