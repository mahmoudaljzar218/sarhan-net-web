<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - السرحان نت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0b1120, #1a2332, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 35px 28px;
            color: #fff;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 160, 255, 0.3);
        }

        .logo-icon {
            font-size: 55px;
            margin-bottom: 10px;
        }

        .company-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcc44, #ffaa33, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #bbd9ff;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            display: inline-block;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            background: rgba(255,255,255,0.25);
            border: 1px solid #00aaff;
        }

        input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(95deg, #0066cc, #0099ff);
            color: white;
            font-family: 'Tajawal', sans-serif;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.97);
        }

        .error-msg {
            color: #ff8888;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .info {
            font-size: 12px;
            color: #88aaff;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo-icon">🛜🔐</div>
    <div class="company-name">السرحان نت</div>
    <div class="subtitle">أدخل كود التسجيل الخاص بك</div>

    <input type="text" id="userCode" placeholder="كود المشترك / رقم الهاتف" autocomplete="off">
    <button onclick="loginToSarhanNet()">تسجيل الدخول</button>
    <div class="error-msg" id="errorMsg">يرجى إدخال الكود أولاً</div>
    <div class="info">سيتم إعادة توجيهك لبوابة الإنترنت بعد التحقق</div>
</div>

<script>
    // دالة تسجيل الدخول - بترمي البيانات على IP الفورتي جيت
    function loginToSarhanNet() {
        // جلب الكود اللي كتبه المستخدم
        const userCode = document.getElementById('userCode').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        
        // التأكد إن المستخدم كتب حاجة
        if (userCode === "") {
            errorMsg.style.display = "block";
            errorMsg.innerText = "❌ من فضلك أدخل كود المشترك";
            return;
        }

        // جلب الـ magic من الرابط (لو موجود)
        const urlParams = new URLSearchParams(window.location.search);
        let magic = urlParams.get('magic');
        
        // لو مفيش magic في الرابط، استخدم قيمة افتراضية
        if (!magic) {
            magic = "0000000000000000";
        }

        // الأي بي بتاع الفورتي جيت - هنا هيتحول البيانات
        const gatewayUrl = "http://192.168.1.99:1000/fgtauth";

        // إنشاء form وإرسال البيانات بالـ POST
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = gatewayUrl;
        form.style.display = 'none';

        // الحقول اللي هتتبعت للـ gateway
        const fields = {
            'username': userCode,
            'password': '123456',      // الباسورد حسب ما هو محدد عندك
            'magic': magic
        };

        for (const key in fields) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        
        // إظهار رسالة للمستخدم إنه جاري التوجيه
        errorMsg.style.display = "block";
        errorMsg.style.color = "#88ff88";
        errorMsg.innerText = "⏳ جاري الاتصال ببوابة الإنترنت...";
        
        // تأخير بسيط ثم إرسال الفورم
        setTimeout(() => {
            form.submit();
        }, 500);
    }

    // دعم الضغط على Enter
    document.getElementById('userCode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            loginToSarhanNet();
        }
    });
</script>

</body>
</html>
