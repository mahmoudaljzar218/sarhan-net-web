<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل دخول - السرحان نت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 20% 30%, #010816, #000000);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0; padding: 20px;
        }
        .login-card {
            border: 1.5px solid #1e3a8a;
            border-radius: 2.5rem;
            background: #020617cc;
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            box-shadow: 0 0 40px rgba(30, 58, 138, 0.4);
            text-align: center;
        }
        .input-group { position: relative; margin-top: 20px; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #1e3a8a; }
        .input-field {
            background: #030a1a; border: 1px solid #1e3a8a; border-radius: 1rem;
            padding: 12px 40px 12px 15px; width: 100%; color: white; outline: none; text-align: right;
        }
        .login-btn {
            background: linear-gradient(135deg, #ffffff, #e2e8f0); color: #010816;
            width: 100%; padding: 14px; border-radius: 1rem; font-weight: 900; margin-top: 20px; cursor: pointer;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; border-radius: 1rem;
            padding: 10px; color: #ef4444; margin-top: 15px; display: none;
        }
        .loading-spinner {
            display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
            border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="mb-5">
            <h1 class="text-3xl font-black italic">السرحان <span class="text-cyan-500">NET</span></h1>
            <p class="text-[10px] text-cyan-500 font-bold uppercase mt-1">بوابة العملاء</p>
        </div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم أو رقم الجوال">
        </div>

        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" id="password" class="input-field" placeholder="كود التفعيل">
        </div>

        <label class="flex items-center gap-2 mt-4 cursor-pointer">
            <input type="checkbox" id="rememberMe" class="accent-cyan-500">
            <span class="text-xs text-slate-400">تذكرني على هذا الجهاز</span>
        </label>

        <button onclick="handleLogin()" class="login-btn" id="loginBtn">دخول</button>

        <div id="errorMsg" class="error-msg"></div>

        <p class="text-[9px] text-slate-700 mt-5 italic">Secure Gateway v3.0 | Sarhan NET</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        let isLoading = false;
        // استلام الـ magic من الفايروول
        const urlParams = new URLSearchParams(window.location.search);
        const magic = urlParams.get('magic');
        const fgtIp = "192.168.1.170";
        const fgtPort = "1003";

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg; errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
        }

        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = loading ? '<span class="loading-spinner"></span> جاري فتح النت...' : 'دخول';
            btn.disabled = loading;
        }

        // استخدام الصورة الخفية (Image Beacon) لتجنب مشاكل CORS
        function openFirewallNet() {
            if (!magic) return false;
            
            // بناء رابط الطلب كامل
            const url = `http://${fgtIp}:${fgtPort}/fgtauth?username=guest&password=123456&magic=${encodeURIComponent(magic)}`;
            
            // إنشاء صورة خفية وإرسال الطلب
            const img = new Image();
            img.style.display = 'none';
            img.onload = function() {
                console.log("تم إرسال طلب الفتح بنجاح");
            };
            img.onerror = function() {
                console.log("تم إرسال الطلب (قد يظهر خطأ CORS لكنه يعمل)");
            };
            img.src = url;
            
            // إضافة الصورة للصفحة ثم إزالتها
            document.body.appendChild(img);
            setTimeout(() => {
                if (img.parentNode) img.parentNode.removeChild(img);
            }, 1000);
            
            return true;
        }

        async function handleLogin() {
            if (isLoading) return;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError("⚠️ برجاء إدخال البيانات");
                return;
            }

            setLoading(true);

            try {
                const snapshot = await database.ref('active_users').once('value');
                let userValid = false;
                let userKey = "";

                snapshot.forEach((child) => {
                    const user = child.val();
                    if ((user.name === username || user.phone === username || child.key === username) && user.code === password) {
                        userValid = true;
                        userKey = child.key;
                    }
                });

                if (userValid || (username === "محمود" && password === "304932")) {
                    localStorage.setItem('temp_phone', userKey || username);
                    
                    // فتح النت في الفايروول باستخدام الصورة الخفية
                    openFirewallNet();
                    
                    // التحويل بعد نصف ثانية
                    setTimeout(() => {
                        window.location.href = (userValid) ? "user_dashboard.html" : "admin.html";
                    }, 500);
                } else {
                    setLoading(false);
                    showError("❌ البيانات غير صحيحة");
                }
            } catch (e) {
                setLoading(false);
                showError("⚠️ خطأ في الاتصال");
            }
        }
    </script>
</body>
</html>
