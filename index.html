<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ال سرحان نت | لتوزيع الإنترنت</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #041a36; color: white; }
        .hero-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a305d 0%, #041a36 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; transition: 0.4s; }
        .glass-card:hover { transform: translateY(-10px); border-color: #22d3ee; }
        .btn-custom { background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3); transition: 0.3s; }
        .btn-custom:hover { background: #22d3ee; color: #041a36; }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    
    <div class="top-bar w-full py-2 bg-gradient-to-r from-orange-800 to-orange-600">
        <marquee id="topMarquee" class="text-xs font-bold text-white">⚡ السرحان NET | أسرع إنترنت في مصر ⚡</marquee>
    </div>

    <header class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-3xl font-black italic">ال سرحان <span class="text-cyan-400">نت</span></h1>
        <a href="login.html" class="glass-card px-8 py-3 text-xs font-black">تسجيل الدخول <i class="fas fa-user-circle mr-1"></i></a>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 text-center">
        <div class="mb-16">
            <h2 class="text-6xl md:text-8xl font-black mb-4 italic">ال سرحان <span class="text-orange-500">نت</span></h2>
            <p class="text-cyan-400 text-sm tracking-wider">سرعة فائقة • تغطية واقعية • سيطرة كاملة</p>
        </div>

        <div id="plans-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="loading-plans text-center py-20"><i class="fas fa-spinner fa-spin text-4xl text-cyan-400"></i><p class="mt-4">جاري تحميل الباقات...</p></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-20 pb-20">
            <div class="glass-card p-8 text-center">
                <i class="fas fa-wallet text-3xl text-orange-500 mb-3"></i>
                <h4 class="text-xl font-black">أحمد السرحان</h4>
                <p class="text-orange-500 text-xs">المالية والعمليات</p>
                <a href="tel:01068222773" class="inline-block mt-4 bg-white/10 px-6 py-2 rounded-full text-sm">01068222773</a>
            </div>
            <div class="glass-card p-8 text-center">
                <i class="fas fa-code text-3xl text-cyan-400 mb-3"></i>
                <h4 class="text-xl font-black">محمود السرحان</h4>
                <p class="text-cyan-400 text-xs">البرمجة والنظام</p>
                <a href="https://wa.me/201013959433" class="inline-block mt-4 bg-white/10 px-6 py-2 rounded-full text-sm">01013959433</a>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="config.js"></script>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const magic = urlParams.get('magic');
            const post = urlParams.get('post');
            if (magic) {
                sessionStorage.setItem('fgt_magic', magic);
                localStorage.setItem('saved_fgt_magic', magic);
                if (post) sessionStorage.setItem('fgt_post', post);
            }
        })();

        function loadPlans() {
            const container = document.getElementById('plans-container');
            database.ref('plans/packages').on('value', (snap) => {
                const plans = snap.val() || {};
                let html = '';
                let giftPlans = [];
                
                for (const [key, plan] of Object.entries(plans)) {
                    if (plan.hasGift && plan.giftAmount > 0) {
                        giftPlans.push(`${plan.name} (+${plan.giftAmount}G هدية)`);
                    }
                    html += `
                        <div class="glass-card p-8 text-center relative">
                            ${plan.isPopular ? '<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-3 py-0.5 rounded-full text-[9px] font-black">🔥 الأكثر طلباً</div>' : ''}
                            <h3 class="text-2xl font-black mb-2">${plan.name}</h3>
                            <p class="text-cyan-400 font-black text-xl mb-4">${plan.price} جنيه</p>
                            <button onclick="goToPay(${plan.gb}, ${plan.price}, '${plan.name.replace(/'/g, "\\'")}')" class="w-full py-3 rounded-xl btn-custom text-cyan-400 font-black">اطلب الآن</button>
                        </div>
                    `;
                }
                
                if (giftPlans.length > 0) {
                    document.getElementById('topMarquee').innerHTML = `🎁 عروض الهدايا: ${giftPlans.join(' | ')} ⚡ السرحان نت ⚡`;
                }
                
                container.innerHTML = html || '<div class="col-span-full text-center p-10">لا توجد باقات حالياً</div>';
            });
        }

        function goToPay(gb, price, name) {
            const { magic, postUrl } = getFortiGateData();
            let url = `pay.html?gb=${gb}&price=${price}&name=${encodeURIComponent(name)}`;
            if (magic) url += `&magic=${encodeURIComponent(magic)}`;
            if (postUrl) url += `&post=${encodeURIComponent(postUrl)}`;
            window.location.href = url;
        }

        loadPlans();
    </script>
</body>
</html>
